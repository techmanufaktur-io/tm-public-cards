<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>PublicCards</title>
  <meta name="description" content="Login-freie Canvas-, Bild- & Kommentar-PWA." />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/192.png" />
  <link rel="apple-touch-icon" href="./icons/192.png" />

  <!-- Inter font (design system §11) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- mobile top bar -->
  <header id="topbar">
    <button id="menuToggle" class="icon-btn" aria-label="Menü">☰</button>
    <span class="topbar-logo">PublicCards</span>
    <a href="#/new" class="icon-btn" aria-label="Neue Card">＋</a>
  </header>

  <div id="scrim" hidden></div>

  <div id="app">
    <aside id="sidebar"><!-- rendered by app.js --></aside>
    <main id="main"><!-- rendered by app.js --></main>
  </div>

  <div id="toast" hidden></div>

  <!-- Markdown + sanitizer (always sanitize, §9) + HTML→Markdown for the WYSIWYG composer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>
  <script src="./app.js"></script>
  <script>
    // register service worker (PWA app-shell offline, §12)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
